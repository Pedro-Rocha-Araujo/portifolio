<!DOCTYPE html />
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/style/style.css" />
    <link rel="shortcut icon" href="./src/img/favicon.ico" type="image/x-icon" />
    <title>Pedro</title>
</head>
<body>
    <header>
        <img class="cerebro-cima" src="./src/img/cerebro.png" alt="Imagem referente a um cérebro cartoon" />
        <h1>Pedro Rocha Araujo</h1>
        <p>Graduando em Gestão de TI.</p>
        <img class="cerebro-baixo" src="./src/img/cerebro.png" alt="Imagem referente a um cérebro cartoon" />
        <img class="header-image" src="./src/img//header-image.png" alt="Imagem de duas pessoas se divertindo no espaço" />
    </header>

    <main>
        <div class="perfil">
            <figure>
                <h2 class="h2-perfil">Olá!</h2>
                <img class="foto-perfil" src="./src/img/foto.png" alt="Pedro Rocha Araujo" />
                <figcaption class="perfil">
                    <p class="perfil">Me chamo Pedro, estou granduando em Gestão de TI<span class="periodo"> 6/6 Período.</span></p>
                </figcaption>
            </figure>
        </div> 
        <hr />
        <section class="secao-habilidades">
                <figure class="habilidades">
                    <img class="img-habilidades" src="./src/img/programacao.png" alt="imagem cartoon de uma pessoa programando" />
                    <figcaption class="fcap-habilidades">
                        <h3>Desenvolvedor Full Stack</h3>
                        <p>Meu interesse por programação iniciou por conta da minha paixão por jogos de videogame e design, assim unindo ambos os conhecimentos para o desenvolvimento de sites.</p>
                    </figcaption>
                </figure>
        </section>
        <hr /> 
        <section class="autodidata">   
            <figure class="autodidata">
                <img class="img-autodidata" src="./src/img/autodidata.png" alt="Garoto estudando por conta própria" />
                <figcaption class="autodidata">
                    <h3 class="autodidata">Sou uma pessoa muito autodidata</h3>
                    <p class="autodidata">Sempre fui muito curioso em diferentes temas, consequentemente tendo que estudar por conta própria e usando da internet como meio de adquirir conhecimento.</p>
                </figcaption>
            </figure>
        </section>
        <hr />
        <section class="contato">
            <div class="contato">
                <h2 class="contato">Entre em Contato!</h2>
                <p class="contato">Mande uma mensagem expondo seu interesse e irei te responder asssim que possível.</p>
            </div>
            <a class="contato" target="_blank" href="https://www.instagram.com/pedrorocha_12_/">
                <img src="./src/img/insta.png" alt="Logotipo da rede social instagram" />
            </a>
        </section>
    </main>

    <footer class="bottom-container">
        <p class="copyright">© 2025 Pedro Rocha Araujo.</p>
    </footer>
</body>
</html>
